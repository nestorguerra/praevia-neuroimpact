name: GitHub Pages Demo

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build static demo
        working-directory: frontend
        env:
          VITE_AUTH_MODE: api
          VITE_API_PUBLIC_URL: ${{ vars.PRODUCTION_VITE_API_PUBLIC_URL }}
          VITE_APP_ENV: production
          VITE_EMPTY_CLIENT: "true"
          VITE_DEMO_LOGIN_EMAIL: ${{ vars.DEMO_LOGIN_EMAIL }}
          VITE_DEMO_USER_NAME: ${{ vars.DEMO_USER_NAME }}
          VITE_DEMO_ORGANIZATION_NAME: ${{ vars.DEMO_ORGANIZATION_NAME }}
        run: |
          npm run build -- --base="/${{ github.event.repository.name }}/"
          cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - id: deployment
        uses: actions/deploy-pages@v4
