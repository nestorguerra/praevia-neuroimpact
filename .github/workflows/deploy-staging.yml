name: Deploy Staging

on:
  workflow_run:
    workflows:
      - Production Gate
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy-staging:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: staging
    env:
      IMAGE_NAMESPACE: ${{ vars.GHCR_IMAGE_NAMESPACE || github.repository_owner }}
      IMAGE_TAG: staging-${{ github.event.workflow_run.head_sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR for push
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push frontend
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f frontend/Dockerfile \
            --build-arg VITE_API_PUBLIC_URL="${{ vars.STAGING_VITE_API_PUBLIC_URL }}" \
            --build-arg VITE_AUTH_MODE=supabase \
            --build-arg VITE_SUPABASE_URL="${{ vars.STAGING_VITE_SUPABASE_URL }}" \
            --build-arg VITE_SUPABASE_ANON_KEY="${{ vars.STAGING_VITE_SUPABASE_ANON_KEY }}" \
            --build-arg VITE_SENTRY_DSN="${{ vars.STAGING_VITE_SENTRY_DSN }}" \
            --build-arg VITE_APP_ENV=staging \
            -t ghcr.io/${IMAGE_NAMESPACE}/praevia-neuroimpact-frontend:${IMAGE_TAG} \
            --push .

      - name: Build and push backend
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f backend/Dockerfile \
            -t ghcr.io/${IMAGE_NAMESPACE}/praevia-neuroimpact-backend:${IMAGE_TAG} \
            --push .

      - name: Prepare deployment key and env
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.STAGING_DEPLOY_SSH_KEY }}" > ~/.ssh/praevia_deploy_key
          chmod 600 ~/.ssh/praevia_deploy_key
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/praevia_deploy_key
          ssh-keyscan -p "${{ secrets.STAGING_DEPLOY_PORT || 22 }}" "${{ secrets.STAGING_DEPLOY_HOST }}" >> ~/.ssh/known_hosts
          printf '%s' "${{ secrets.STAGING_ENV_FILE }}" > /tmp/.env.staging
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

      - name: Deploy staging
        env:
          DEPLOY_ENV: staging
          DEPLOY_HOST: ${{ secrets.STAGING_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.STAGING_DEPLOY_USER || 'deploy' }}
          DEPLOY_PORT: ${{ secrets.STAGING_DEPLOY_PORT || '22' }}
          DEPLOY_ROOT: ${{ secrets.STAGING_DEPLOY_ROOT || '/opt/praevia-neuroimpact/staging' }}
          ENV_FILE_SOURCE: /tmp/.env.staging
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.actor }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: scripts/deploy-remote-compose.sh

      - name: Verify staging URLs
        env:
          APP_SMOKE_URL: ${{ vars.STAGING_APP_PUBLIC_URL }}
          API_SMOKE_URL: ${{ vars.STAGING_API_PUBLIC_URL }}
          READINESS_TOKEN: ${{ secrets.STAGING_READINESS_TOKEN }}
        run: |
          node scripts/smoke.mjs
          node scripts/production-dependencies-gate.mjs
