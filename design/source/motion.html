<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>PraevIA · Motion · NeuroImpact Analyzer</title>
<link rel="stylesheet" href="tokens.css"/>
<style>
  html, body { background: #0A0E13; min-height: 100vh; color: var(--ink-900); }
  body { display: flex; align-items: center; justify-content: center; padding: 24px; }
  #root { width: 100%; max-width: 1280px; }
  .frame-meta { display: flex; justify-content: space-between; font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.18em; color: var(--text-3); text-transform: uppercase; margin-bottom: 14px; }
  .frame-meta .b { display:flex; align-items:center; gap:10px; color: var(--ink-900); }
  .frame-meta .b em { font-style: italic; font-weight: 400; }
  .frame-meta .b b { font-family: var(--f-ui); font-size: 0.92em; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="animations.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── helpers ─────────────────────────────────────────
const clampN = (v, a, b) => Math.max(a, Math.min(b, v));
const lerp = (a, b, t) => a + (b - a) * t;

// ── reusable bits ───────────────────────────────────
const Mark = ({size=28, pupilFill='#E8A33D'}) => (
  <svg viewBox="0 0 32 32" width={size} height={size} style={{color:'#E8EDF3', display:'block'}}>
    <circle cx="16" cy="16" r="12.5" fill="none" stroke="currentColor" strokeWidth="1.2" opacity="0.35"/>
    <circle cx="16" cy="16" r="7.5" fill="none" stroke="currentColor" strokeWidth="1.4"/>
    <circle cx="13" cy="16" r="2.4" fill={pupilFill}/>
    <line x1="6" y1="4.5" x2="14" y2="4.5" stroke="currentColor" strokeWidth="1.4"/>
  </svg>
);
const Wordmark = ({size=22}) => (
  <span style={{fontFamily:"'Newsreader',serif", fontSize:size, fontWeight:500, letterSpacing:'-0.018em', color:'#E8EDF3'}}>
    prae<em style={{fontStyle:'italic',fontWeight:400}}>vi</em><b style={{fontFamily:"'Geist',sans-serif",fontWeight:600,fontSize:'0.92em'}}>A</b>
  </span>
);

// ── SCENES (all driven by single useTime) ───────────
// We use t (seconds) globally. Total duration: 18s.
// 0 .. 2.5    Logo pulse + claim
// 2.5 .. 5.5  "El comité decide a ciegas"
// 5.5 .. 9.5  Scope: 3 versiones llegan, comparativa
// 9.5 .. 13   Timeline acciona, peak/valley, recomendación
// 13 .. 16    Score crece de 0.78 → 0.89
// 16 .. 18    CTA / cierre

const SceneOne = () => {
  const t = useTime();
  // pulse from 0..1.6
  const p = clampN(t / 1.6, 0, 1);
  const ringScale = 0.6 + Easing.easeOutCubic(p) * 1.0;
  const ringOpacity = clampN(1 - p, 0, 1);
  const wmFade = clampN((t - 0.4) / 0.6, 0, 1);
  const claimY = lerp(20, 0, Easing.easeOutCubic(clampN((t - 0.9) / 0.8, 0, 1)));
  const claimOp = clampN((t - 0.9) / 0.8, 0, 1);
  const exitOp = clampN((2.5 - t) / 0.4, 0, 1);

  return (
    <Sprite start={0} end={2.6}>
      <div style={{position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', opacity: exitOp}}>
        <div style={{position:'relative', width:120, height:120, marginBottom:28}}>
          {[0, 0.4, 0.8].map((d, i) => {
            const lp = clampN((t - d) / 1.4, 0, 1);
            return (
              <div key={i} style={{
                position:'absolute', inset:0,
                border:'1px solid #E8A33D',
                borderRadius:'50%',
                transform:`scale(${0.4 + lp * 1.6})`,
                opacity: (1 - lp) * 0.5,
                transition:'none',
              }}/>
            );
          })}
          <div style={{position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center'}}>
            <Mark size={64}/>
          </div>
        </div>
        <div style={{opacity: wmFade}}><Wordmark size={36}/></div>
        <div style={{
          marginTop:32,
          opacity: claimOp,
          transform:`translateY(${claimY}px)`,
          fontFamily:"'JetBrains Mono',monospace",
          fontSize:11, letterSpacing:'0.22em',
          color:'#E8A33D',
          textTransform:'uppercase'
        }}>── NeuroImpact Analyzer · v1.0 ──</div>
      </div>
    </Sprite>
  );
};

const SceneTwo = () => {
  const t = useTime();
  const local = t - 2.5;
  if (local < 0 || t > 5.7) return null;
  const inP = clampN(local / 0.6, 0, 1);
  const exitOp = clampN((5.5 - t) / 0.5, 0, 1);
  const reveal = clampN((local - 0.5) / 0.7, 0, 1);

  return (
    <div style={{position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center', opacity: Math.min(inP, exitOp)}}>
      <div style={{textAlign:'center', maxWidth:'70%'}}>
        <div style={{fontFamily:"'JetBrains Mono',monospace", fontSize:11, letterSpacing:'0.22em', color:'var(--text-3)', textTransform:'uppercase', marginBottom:24}}>HOY · 11:34 · COMITÉ CREATIVO</div>
        <div style={{fontFamily:"'Newsreader',serif", fontSize:64, fontWeight:400, lineHeight:1.05, letterSpacing:'-0.025em', color:'#E8EDF3'}}>
          <div>El comité decide</div>
          <div style={{position:'relative', display:'inline-block'}}>
            <span style={{fontStyle:'italic', color:'#E8A33D', position:'relative'}}>
              a ciegas
              <span style={{
                position:'absolute', left:0, right:0, top:'56%',
                height:2, background:'#E8674A',
                transformOrigin:'left center',
                transform:`scaleX(${Easing.easeOutCubic(reveal)})`,
              }}/>
            </span>
            <span style={{color:'#E8EDF3'}}>.</span>
          </div>
          <div style={{
            marginTop:10,
            opacity: clampN((local - 1.2) / 0.6, 0, 1),
            fontSize:36, color:'var(--text-2)'
          }}>Otra vez.</div>
        </div>
      </div>
    </div>
  );
};

// Three videos sliding in
const SceneThree = () => {
  const t = useTime();
  const start = 5.5;
  const local = t - start;
  if (local < 0 || t > 9.7) return null;
  const exitOp = clampN((9.5 - t) / 0.4, 0, 1);

  const versions = [
    {key:'A', tag:'master', color:'#E8A33D', delay:0},
    {key:'B', tag:'social', color:'#6FD4E8', delay:0.25},
    {key:'C', tag:'short', color:'#9B7FE8', delay:0.5},
  ];

  return (
    <div style={{position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'40px 60px', opacity: exitOp}}>
      <div style={{
        fontFamily:"'JetBrains Mono',monospace", fontSize:11, letterSpacing:'0.22em',
        color:'#E8A33D', textTransform:'uppercase', marginBottom:36,
        opacity: clampN(local / 0.4, 0, 1)
      }}>── COMPARATIVA · 3 VERSIONES · 75 SEG ──</div>

      <div style={{display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:20, width:'100%', maxWidth:980}}>
        {versions.map((v, i) => {
          const lp = clampN((local - v.delay) / 0.7, 0, 1);
          const eased = Easing.easeOutCubic(lp);
          const ranking = clampN((local - 2.0) / 0.6, 0, 1);
          const isWinner = v.key === 'A';
          const winnerScale = isWinner ? 1 + ranking * 0.04 : 1 - ranking * 0.02;
          const winnerOp = isWinner ? 1 : 1 - ranking * 0.4;

          return (
            <div key={v.key} style={{
              opacity: eased * winnerOp,
              transform: `translateY(${(1-eased) * 40}px) scale(${winnerScale})`,
              background: '#11161D',
              border: `1px solid ${isWinner && ranking > 0.5 ? v.color : 'var(--border)'}`,
              borderRadius:6,
              overflow:'hidden',
              transition:'none',
            }}>
              <div style={{padding:'10px 14px', borderBottom:'1px solid var(--border)', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                <span style={{fontFamily:"'JetBrains Mono',monospace", fontSize:11, letterSpacing:'0.14em', color:'var(--text-3)', textTransform:'uppercase'}}>VERSION_<span style={{color:v.color, fontStyle:'normal'}}>{v.key}</span> · {v.tag}</span>
                {isWinner && ranking > 0.5 && (
                  <span style={{fontFamily:"'JetBrains Mono',monospace", fontSize:9, letterSpacing:'0.14em', color:v.color, opacity: ranking}}>★ TOP</span>
                )}
              </div>
              <div style={{aspectRatio:'16/9', background:'#0A0E13', position:'relative', overflow:'hidden'}}>
                {/* placeholder video stripes */}
                <div style={{position:'absolute', inset:0, background:`repeating-linear-gradient(45deg, rgba(255,255,255,0.025) 0 2px, transparent 2px 12px)`}}/>
                <div style={{position:'absolute', left:14, top:14, fontFamily:"'JetBrains Mono',monospace", fontSize:10, color:'var(--text-3)', letterSpacing:'0.14em'}}>{v.tag.toUpperCase()}_{v.key}.MP4</div>
                <div style={{position:'absolute', right:14, bottom:14, fontFamily:"'JetBrains Mono',monospace", fontSize:10, color:'var(--text-3)', letterSpacing:'0.14em'}}>00:30</div>
              </div>
              <div style={{padding:'14px', borderTop:'1px solid var(--border)', display:'flex', justifyContent:'space-between', alignItems:'baseline'}}>
                <div>
                  <div style={{fontFamily:"'JetBrains Mono',monospace", fontSize:9, letterSpacing:'0.14em', color:'var(--text-3)', textTransform:'uppercase'}}>NRI</div>
                  <div style={{fontFamily:"'JetBrains Mono',monospace", fontSize:28, fontWeight:500, color: ranking > 0.3 ? v.color : '#E8EDF3', letterSpacing:'-0.02em', marginTop:2}}>
                    {(0.78 - i * 0.06).toFixed(2)}
                  </div>
                </div>
                <div style={{
                  fontFamily:"'JetBrains Mono',monospace", fontSize:9, letterSpacing:'0.14em', color:'var(--text-3)', textTransform:'uppercase',
                  opacity: ranking,
                }}>
                  {isWinner ? '+0.12 vs B' : v.key === 'B' ? '−0.12 vs A' : '−0.17 vs A'}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
};

// Timeline scene
const SceneFour = () => {
  const t = useTime();
  const start = 9.5;
  const local = t - start;
  if (local < 0 || t > 13.2) return null;
  const inOp = clampN(local / 0.5, 0, 1);
  const exitOp = clampN((13 - t) / 0.4, 0, 1);

  // playhead sweeps left to right 0..3s
  const sweep = clampN(local / 2.6, 0, 1);
  const playX = sweep * 980;

  // peak detected when sweep > 0.4 (around 00:14 marker)
  const peakDetected = clampN((local - 1.2) / 0.4, 0, 1);
  const valleyDetected = clampN((local - 1.8) / 0.4, 0, 1);
  const recsShow = clampN((local - 2.2) / 0.5, 0, 1);

  return (
    <div style={{position:'absolute', inset:0, padding:'40px 60px', display:'flex', flexDirection:'column', justifyContent:'center', opacity: Math.min(inOp, exitOp)}}>
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:18}}>
        <div>
          <div style={{fontFamily:"'JetBrains Mono',monospace", fontSize:11, letterSpacing:'0.22em', color:'#E8A33D', textTransform:'uppercase'}}>── TIMELINE ACCIONABLE ──</div>
          <div style={{fontFamily:"'Newsreader',serif", fontSize:32, fontWeight:400, color:'#E8EDF3', letterSpacing:'-0.018em', marginTop:8}}>
            Picos. Valles. <em style={{fontStyle:'italic', color:'#E8A33D'}}>Acciones</em>.
          </div>
        </div>
        <div style={{fontFamily:"'JetBrains Mono',monospace", fontSize:10, letterSpacing:'0.14em', color:'var(--text-3)', textTransform:'uppercase'}}>CONF 0.91 · n=312</div>
      </div>

      <div style={{background:'#11161D', border:'1px solid var(--border)', borderRadius:6, padding:16, position:'relative'}}>
        <svg viewBox="0 0 1000 220" style={{width:'100%', height:220, display:'block'}}>
          <defs>
            <linearGradient id="ga2" x1="0" x2="0" y1="0" y2="1">
              <stop offset="0" stopColor="#E8A33D" stopOpacity="0.25"/>
              <stop offset="1" stopColor="#E8A33D" stopOpacity="0"/>
            </linearGradient>
            <clipPath id="reveal">
              <rect x="0" y="0" width={playX} height="220"/>
            </clipPath>
          </defs>
          <g stroke="rgba(255,255,255,0.05)" strokeWidth="1">
            <line x1="0" y1="55" x2="1000" y2="55"/><line x1="0" y1="110" x2="1000" y2="110"/><line x1="0" y1="165" x2="1000" y2="165"/>
            {[100,200,300,400,500,600,700,800,900].map(x=>(<line key={x} x1={x} y1="0" x2={x} y2="220"/>))}
          </g>

          {/* curves with reveal mask */}
          <g clipPath="url(#reveal)">
            <path d="M 0 130 Q 60 80, 110 100 T 220 90 T 330 70 T 440 35 T 550 90 T 660 70 T 770 120 T 880 145 T 990 75" stroke="#E8A33D" strokeWidth="2.4" fill="none"/>
            <path d="M 0 130 Q 60 80, 110 100 T 220 90 T 330 70 T 440 35 T 550 90 T 660 70 T 770 120 T 880 145 T 990 75 L 990 220 L 0 220 Z" fill="url(#ga2)"/>
            <path d="M 0 145 Q 60 155, 110 135 T 220 145 T 330 125 T 440 155 T 550 130 T 660 150 T 770 140 T 880 125 T 990 145" stroke="#6FD4E8" strokeWidth="1.8" fill="none" opacity="0.85"/>
            <path d="M 0 165 Q 60 175, 110 160 T 220 170 T 330 165 T 440 175 T 550 150 T 660 165 T 770 150 T 880 120 T 990 135" stroke="#9B7FE8" strokeWidth="1.6" fill="none" opacity="0.7" strokeDasharray="3 3"/>
          </g>

          {/* peak marker */}
          {peakDetected > 0.05 && (
            <g opacity={peakDetected}>
              <line x1="440" y1="0" x2="440" y2="220" stroke="#B8E04A" strokeWidth="1" strokeDasharray="3 3" opacity="0.7"/>
              <circle cx="440" cy="35" r={4 + peakDetected * 4} fill="#B8E04A" opacity={1 - peakDetected * 0.3}/>
              <circle cx="440" cy="35" r="4" fill="#B8E04A"/>
              <text x="448" y="26" fontFamily="JetBrains Mono" fontSize="11" fill="#B8E04A">PEAK · 00:14</text>
            </g>
          )}
          {/* valley */}
          {valleyDetected > 0.05 && (
            <g opacity={valleyDetected}>
              <line x1="770" y1="0" x2="770" y2="220" stroke="#E8674A" strokeWidth="1" strokeDasharray="3 3" opacity="0.7"/>
              <circle cx="770" cy="120" r={4 + valleyDetected * 4} fill="#E8674A" opacity={1 - valleyDetected * 0.3}/>
              <circle cx="770" cy="120" r="4" fill="#E8674A"/>
              <text x="762" y="142" fontFamily="JetBrains Mono" fontSize="11" fill="#E8674A" textAnchor="end">VALLEY · 00:21</text>
            </g>
          )}

          {/* playhead */}
          <line x1={playX} y1="0" x2={playX} y2="220" stroke="#E8EDF3" strokeWidth="1" opacity="0.85"/>
          <polygon points={`${playX-5},0 ${playX+5},0 ${playX},8`} fill="#E8EDF3"/>
        </svg>

        {/* recommendation popup */}
        {recsShow > 0.05 && (
          <div style={{
            position:'absolute', right:24, bottom:24,
            background:'#0A0E13', border:'1px solid #E8A33D', borderRadius:4, padding:'12px 16px',
            opacity: recsShow, transform:`translateY(${(1-recsShow)*12}px)`,
            maxWidth:340,
          }}>
            <div style={{fontFamily:"'JetBrains Mono',monospace", fontSize:10, letterSpacing:'0.16em', color:'#E8A33D', textTransform:'uppercase', marginBottom:6}}>→ RECOMENDACIÓN · 00:18-22</div>
            <div style={{fontFamily:"'Newsreader',serif", fontSize:14.5, color:'#E8EDF3', lineHeight:1.4}}>
              <span style={{color:'#9B7FE8', fontFamily:"'JetBrains Mono',monospace", fontSize:10, letterSpacing:'0.14em', textTransform:'uppercase'}}>texto · </span>
              Reducir 6 palabras de la locución. <span style={{color:'var(--text-3)', fontFamily:"'JetBrains Mono',monospace", fontSize:10}}>CONF 0.88</span>
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

// Score grows scene
const SceneFive = () => {
  const t = useTime();
  const start = 13;
  const local = t - start;
  if (local < 0 || t > 16.2) return null;
  const inOp = clampN(local / 0.5, 0, 1);
  const exitOp = clampN((16 - t) / 0.5, 0, 1);

  const fillP = clampN((local - 0.4) / 1.6, 0, 1);
  const score = lerp(0.78, 0.89, Easing.easeOutCubic(fillP));
  const numText = score.toFixed(2);

  return (
    <div style={{position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', opacity: Math.min(inOp, exitOp)}}>
      <div style={{fontFamily:"'JetBrains Mono',monospace", fontSize:11, letterSpacing:'0.22em', color:'#E8A33D', textTransform:'uppercase', marginBottom:32}}>── APLICANDO 5 RECOMENDACIONES ──</div>

      <div style={{display:'flex', alignItems:'baseline', gap:48}}>
        <div style={{textAlign:'center'}}>
          <div style={{fontFamily:"'JetBrains Mono',monospace", fontSize:10, letterSpacing:'0.16em', color:'var(--text-3)', textTransform:'uppercase', marginBottom:14}}>ANTES</div>
          <div style={{fontFamily:"'JetBrains Mono',monospace", fontSize:96, fontWeight:500, color:'var(--text-3)', letterSpacing:'-0.04em', lineHeight:1}}>0.78</div>
        </div>
        <div style={{
          fontFamily:"'JetBrains Mono',monospace", fontSize:36, color:'#E8A33D',
          opacity: clampN(local / 0.4, 0, 1),
        }}>→</div>
        <div style={{textAlign:'center'}}>
          <div style={{fontFamily:"'JetBrains Mono',monospace", fontSize:10, letterSpacing:'0.16em', color:'#E8A33D', textTransform:'uppercase', marginBottom:14}}>DESPUÉS</div>
          <div style={{fontFamily:"'JetBrains Mono',monospace", fontSize:120, fontWeight:500, color:'#E8A33D', letterSpacing:'-0.04em', lineHeight:1}}>{numText}</div>
        </div>
      </div>

      <div style={{
        marginTop:32,
        opacity: clampN((local - 1.6) / 0.5, 0, 1),
        fontFamily:"'Newsreader',serif", fontSize:24, color:'#E8EDF3', letterSpacing:'-0.012em', lineHeight:1.3, textAlign:'center', maxWidth:'60ch',
      }}>
        NRI <em style={{fontStyle:'italic', color:'#E8A33D'}}>+14%</em>. Action Readiness <em style={{fontStyle:'italic', color:'#E8A33D'}}>+38%</em>.<br/>
        <span style={{fontSize:18, color:'var(--text-2)'}}>Antes de gastar el primer euro en producción.</span>
      </div>
    </div>
  );
};

// Final CTA
const SceneSix = () => {
  const t = useTime();
  const start = 16;
  const local = t - start;
  if (local < 0) return null;
  const inOp = clampN(local / 0.6, 0, 1);

  return (
    <div style={{position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', opacity: inOp}}>
      <Mark size={36}/>
      <div style={{marginTop:18, marginBottom:24}}><Wordmark size={42}/></div>

      <div style={{fontFamily:"'Newsreader',serif", fontSize:48, fontWeight:400, color:'#E8EDF3', letterSpacing:'-0.025em', lineHeight:1.05, textAlign:'center', maxWidth:'14ch'}}>
        Decide qué <em style={{fontStyle:'italic', color:'#E8A33D'}}>versión</em><br/>usar. Antes.
      </div>

      <div style={{
        marginTop:40,
        opacity: clampN((local - 0.7) / 0.5, 0, 1),
        fontFamily:"'JetBrains Mono',monospace", fontSize:11, letterSpacing:'0.22em', color:'#E8A33D', textTransform:'uppercase',
        padding:'12px 20px', border:'1px solid #E8A33D', borderRadius:2,
      }}>→ PRAEVIA.ES / DEMO</div>
    </div>
  );
};

// progress bar overlay
const ProgressOverlay = () => {
  const t = useTime();
  const total = 18;
  const p = clampN(t / total, 0, 1);
  return (
    <>
      {/* bg dot grid */}
      <div style={{position:'absolute', inset:0, backgroundImage:'radial-gradient(circle, rgba(255,255,255,0.025) 1px, transparent 1px)', backgroundSize:'32px 32px', pointerEvents:'none'}}/>
      {/* corner watermark */}
      <div style={{position:'absolute', top:24, left:28, display:'flex', alignItems:'center', gap:8, fontFamily:"'JetBrains Mono',monospace", fontSize:10, letterSpacing:'0.18em', color:'var(--text-3)', textTransform:'uppercase'}}>
        <Mark size={16}/>
        <Wordmark size={14}/>
        <span style={{borderLeft:'1px solid var(--border)', paddingLeft:10, marginLeft:4}}>NeuroImpact Analyzer</span>
      </div>
      <div style={{position:'absolute', top:24, right:28, fontFamily:"'JetBrains Mono',monospace", fontSize:10, letterSpacing:'0.18em', color:'var(--text-3)', textTransform:'uppercase'}}>
        REC · {String(Math.floor(t)).padStart(2,'0')}:{String(Math.floor((t%1)*100)).padStart(2,'0')} / 18:00
      </div>
      {/* bottom progress bar */}
      <div style={{position:'absolute', left:28, right:28, bottom:24, height:2, background:'rgba(255,255,255,0.08)'}}>
        <div style={{height:'100%', background:'#E8A33D', width:`${p*100}%`, transition:'none'}}/>
      </div>
    </>
  );
};

// ── App ────────────────────────────────────────────
const App = () => (
  <>
    <div className="frame-meta">
      <div className="b">
        <Mark size={18}/>
        <span style={{fontFamily:"'Newsreader',serif", fontSize:17, fontWeight:500, letterSpacing:'-0.018em'}}>
          prae<em style={{fontStyle:'italic',fontWeight:400}}>vi</em><b style={{fontFamily:"'Geist',sans-serif",fontWeight:600,fontSize:'0.92em'}}>A</b>
        </span>
        <span style={{fontFamily:"'JetBrains Mono',monospace", fontSize:9, letterSpacing:'0.18em', color:'var(--text-3)', borderLeft:'1px solid var(--border)', paddingLeft:10, marginLeft:6}}>MOTION · TEASER · 18S</span>
      </div>
      <div>1280 × 720 · 16:9 · sin sonido</div>
    </div>
