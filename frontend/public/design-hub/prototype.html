// ─── ANALYSIS / LOADING ─────────────────────────────
const Analysis = ({ onDone }) => {
  const [step, setStep] = useState(0);
  const steps = [
    'Validación de archivos y metadatos',
    'Extracción de fotogramas y transcripción',
    'Inferencia visual · saliencia y escena',
    'Inferencia auditiva · ritmo y prosodia',
    'Inferencia narrativa · claridad y carga',
    'Coherencia multimodal y benchmarking',
    'Generación de recomendaciones',
  ];
  useEffect(() => {
    if (step >= steps.length) { setTimeout(onDone, 500); return; }
    const t = setTimeout(() => setStep(s => s + 1), step === 0 ? 800 : 1100);
    return () => clearTimeout(t);
  }, [step]);

  return (
    <div className="analysis">
      <div className="analysis-inner">
        <div className="label">● PROCESANDO · 3 PIEZAS · 75 SEG</div>
        <h1>El instrumento <em>está observando</em>.</h1>
        <p style={{fontFamily:"'Newsreader',serif",fontSize:17,color:'var(--text-2)',lineHeight:1.55,maxWidth:'52ch',marginBottom:32}}>
          Esta es la única espera del producto. Cuando termine, tendrás un timeline accionable, recomendaciones por timecode y un PDF listo para circular.
        </p>
        <div className="steps">
          {steps.map((s, i) => (
            <div key={i} className={`step ${i<step?'done':''} ${i===step?'active':''}`}>
              <span className="num">{String(i+1).padStart(2,'0')}</span>
              <span className="name">{s}</span>
              <span className="status">{i<step?'OK':i===step?'EN CURSO':'PENDIENTE'}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

              <text x="872" y="156" fontFamily="JetBrains Mono" fontSize="10" fill="#E8674A" textAnchor="end">VALLEY · 00:22 · semantic load</text>
              {/* playhead */}
              <line x1={playhead} y1="0" x2={playhead} y2="200" stroke="#E8EDF3" strokeWidth="1" opacity="0.7"/>
              <polygon points={`${playhead-4},0 ${playhead+4},0 ${playhead},6`} fill="#E8EDF3"/>
              <rect x={playhead+4} y="6" width="80" height="20" rx="2" fill="#0A0E13" stroke="#E8EDF3" strokeOpacity="0.5"/>
              <text x={playhead+10} y="20" fontFamily="JetBrains Mono" fontSize="10" fill="#E8EDF3">{`00:${String(Math.floor((playhead/1100)*30)).padStart(2,'0')}.${String(Math.floor((playhead/1100)*30*100)%100).padStart(2,'0')}`}</text>
            </svg>
            <div className="ruler">
              {[0,3,6,9,12,15,18,21,24,27,30].map(s=>(<span key={s}>00:{String(s).padStart(2,'0')}</span>))}
            </div>
          </div>
        </div>

        {/* recommendations */}
        <div className="recs">
          <div className="head">
            <h3>Recomendaciones priorizadas</h3>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,letterSpacing:'0.14em',color:'var(--text-3)',textTransform:'uppercase'}}>5 acciones · ordenadas por impacto</span>
          </div>
          {[
            {tc:'00:08', layer:'visual', txt:'Adelantar el plano del rostro humano. Mejora Social Cueing en +0.14 estimado.', conf:0.94, layerKey:'visual'},
            {tc:'00:14', layer:'audio', txt:'Aprovechar el peak con un acento sonoro o silencio sostenido. Refuerza la decisión de cierre.', conf:0.91, layerKey:'audio'},
            {tc:'00:18-00:22', layer:'texto', txt:'Reducir 6 palabras de la locución. Densidad verbal por encima del benchmark de banca.', conf:0.88, layerKey:'text'},
            {tc:'00:22', layer:'visual', txt:'Cortar 2s del valle o sustituir por b-roll. La continuidad visual cae aquí.', conf:0.82, layerKey:'visual'},
            {tc:'00:26-00:30', layer:'texto', txt:'Reformular CTA: pasar de pasiva a imperativa. Action Readiness sube +0.18 esperado.', conf:0.76, layerKey:'text'},
          ].map((r,i) => (
            <div key={i} className="rec">
              <div className="tc">{r.tc}</div>
              <div className={`layer ${r.layerKey}`}>{r.layer}</div>
              <div className="what">{r.txt}</div>
              <div className="conf">CONF <b>{r.conf.toFixed(2)}</b></div>
            </div>
          ))}
        </div>

        <div style={{marginTop:24,padding:'24px 28px',background:'rgba(232,163,61,0.06)',border:'1px solid rgba(232,163,61,0.3)',borderRadius:6,display:'flex',justifyContent:'space-between',alignItems:'center',gap:24}}>
          <div>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,letterSpacing:'0.16em',color:'var(--signal-amber)',textTransform:'uppercase',marginBottom:6}}>★ DECISIÓN RECOMENDADA</div>
            <div style={{fontFamily:"'Newsreader',serif",fontSize:24,fontWeight:500,letterSpacing:'-0.012em',lineHeight:1.2,maxWidth:'60ch'}}>
              Usar <em style={{color:'var(--signal-amber)'}}>Versión A</em> como master. Aplicar las 5 recomendaciones. Tomar de Versión B el cierre (00:24-00:30).
            </div>
          </div>
          <button className="b b-primary" style={{padding:'12px 22px'}}>Aprobar y exportar →</button>
        </div>
      </div>
    </>
  );
};

// ─── APP ───────────────────────────────────────────
const App = () => {
  const [stage, setStage] = useState('login'); // login | shell
  const [screen, setScreen] = useState('dashboard');

  if (stage === 'login') return <Login onSignIn={()=>setStage('shell')}/>;

  let body;
  if (screen === 'dashboard') body = <Workspace setScreen={setScreen}/>;
  else if (screen === 'upload') body = <Upload onAnalyze={()=>setScreen('analysis')}/>;
  else if (screen === 'analysis') body = <Analysis onDone={()=>setScreen('compare')}/>;
  else if (screen === 'compare') body = <Compare/>;
  else body = <div className="page-body" style={{padding:64}}><div style={{fontFamily:"'Newsreader',serif",fontSize:24,color:'var(--text-2)'}}>Pantalla en construcción — el prototipo se concentra en el flujo principal: <em>Workspace → Upload → Análisis → Comparativa</em>.</div></div>;

  return (
    <Shell screen={screen} setScreen={setScreen} project={screen==='compare'?'Spot 30s · Hipoteca Verde':null}>
      {body}
    </Shell>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
